name: Build macOS

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Target architecture
        required: false
        default: all
        type: choice
        options:
          - all
          - arm64
          - x64
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json', 'apps/desktop/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Prepare desktop.config.json
        run: cp config/desktop.config.example.json desktop.config.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build macOS package
        run: |
          case "${{ github.event_name == 'workflow_dispatch' && inputs.arch || 'all' }}" in
            arm64) npm run dist:mac:arm64 -w @domain-whiz/desktop ;;
            x64)   npm run dist:mac:x64   -w @domain-whiz/desktop ;;
            *)     npm run dist:mac       -w @domain-whiz/desktop ;;
          esac

      - name: Resolve version
        id: version
        run: echo "value=$(node -p "require('./apps/desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: domain-whiz-macos-${{ steps.version.outputs.value }}
          path: |
            apps/desktop/release/${{ steps.version.outputs.value }}/*.dmg
            apps/desktop/release/${{ steps.version.outputs.value }}/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/${{ steps.version.outputs.value }}/*.dmg
            apps/desktop/release/${{ steps.version.outputs.value }}/*.zip
          generate_release_notes: true
